name: CD - Deploy Banking API

on:
  workflow_run:
    workflows:
      - CI - Banking API
    types:
      - completed

jobs:
  deploy-backend:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/BankingAPI
          file: ./backend/BankingAPI/Dockerfile
          push: true
          tags: |
            jenithamaxi23/banking-api:latest
            jenithamaxi23/banking-api:${{ github.event.workflow_run.head_sha }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: banking-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: jenithamaxi23/banking-api:${{ github.event.workflow_run.head_sha }}